x-ais-environment: &ais-environment
  AIS_SOURCE: "${AIS_SOURCE:-fixture}"
  AIS_FIXTURE_PATH: "${AIS_FIXTURE_PATH:-/app/app/fixtures/aisstream-position-reports-sample.json}"
  AIS_ALLOW_FIXTURE_FALLBACK: "${AIS_ALLOW_FIXTURE_FALLBACK:-true}"
  AISSTREAM_WS_URL: "${AISSTREAM_WS_URL:-wss://stream.aisstream.io/v0/stream}"
  AISSTREAM_API_KEY: "${AISSTREAM_API_KEY:-}"
  AISSTREAM_BOUNDING_BOXES: "${AISSTREAM_BOUNDING_BOXES:-[[[40.4774,-74.2591],[40.9176,-73.7004]]]}"
  AISSTREAM_MESSAGE_TYPES: "${AISSTREAM_MESSAGE_TYPES:-PositionReport}"
  AISSTREAM_CONNECT_TIMEOUT_SECONDS: "${AISSTREAM_CONNECT_TIMEOUT_SECONDS:-30}"
  AISSTREAM_SAMPLE_MESSAGE_LIMIT: "${AISSTREAM_SAMPLE_MESSAGE_LIMIT:-50}"
  AISSTREAM_DISABLE_TLS_VERIFY: "${AISSTREAM_DISABLE_TLS_VERIFY:-false}"

services:
  frontend:
    build:
      context: ./frontend
    command: npm run dev -- --host 0.0.0.0
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
      VITE_API_PROXY_TARGET: ${VITE_API_PROXY_TARGET:-http://backend:8000}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

  backend:
    build:
      context: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      <<: *ais-environment
      DATABASE_URL: ${DATABASE_URL:-}
      POSTGRES_HOST: ${POSTGRES_HOST:-db}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-vector}
      POSTGRES_USER: ${POSTGRES_USER:-vector}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vector}
      POSTGRES_CONNECT_TIMEOUT: ${POSTGRES_CONNECT_TIMEOUT:-5}
      POSTGRES_POOL_MIN_SIZE: ${POSTGRES_POOL_MIN_SIZE:-1}
      POSTGRES_POOL_MAX_SIZE: ${POSTGRES_POOL_MAX_SIZE:-5}
      POSTGRES_POOL_TIMEOUT: ${POSTGRES_POOL_TIMEOUT:-5}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      TEST_POSTGRES_HOST: ${TEST_POSTGRES_HOST:-db}
      TEST_POSTGRES_PORT: ${TEST_POSTGRES_PORT:-5432}
      TEST_POSTGRES_DB: ${TEST_POSTGRES_DB:-vector_test}
      TEST_POSTGRES_USER: ${TEST_POSTGRES_USER:-vector}
      TEST_POSTGRES_PASSWORD: ${TEST_POSTGRES_PASSWORD:-vector}
      TEST_POSTGRES_CONNECT_TIMEOUT: ${TEST_POSTGRES_CONNECT_TIMEOUT:-5}
      TEST_POSTGRES_POOL_MIN_SIZE: ${TEST_POSTGRES_POOL_MIN_SIZE:-1}
      TEST_POSTGRES_POOL_MAX_SIZE: ${TEST_POSTGRES_POOL_MAX_SIZE:-5}
      TEST_POSTGRES_POOL_TIMEOUT: ${TEST_POSTGRES_POOL_TIMEOUT:-5}
      FRONTEND_ORIGINS: ${FRONTEND_ORIGINS:-http://127.0.0.1:5173,http://localhost:5173}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
      - ./docs:/docs:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()",
        ]
      interval: 5s
      timeout: 5s
      retries: 12

  ais-consumer:
    build:
      context: ./backend
    command: python -m app.ais_consumer
    environment:
      <<: *ais-environment
      AIS_CONSUMER_POLL_SECONDS: "${AIS_CONSUMER_POLL_SECONDS:-60}"
      AIS_CONSUMER_RUN_ONCE: "${AIS_CONSUMER_RUN_ONCE:-false}"
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    volumes:
      - ./backend:/app
      - ./docs:/docs:ro
    depends_on:
      redis:
        condition: service_healthy

  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vector}
      POSTGRES_USER: ${POSTGRES_USER:-vector}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vector}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12

  pgadmin:
    image: dpage/pgadmin4:8
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-vector}
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      db:
        condition: service_healthy

volumes:
  frontend_node_modules:
  postgres_data:
  pgadmin_data:
