# Flyway configuration for Vector app
# Environment variables take precedence over values here

# Database connection (will be overridden by environment variables at runtime)
flyway.url=jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
flyway.user=${POSTGRES_USER}
flyway.password=${POSTGRES_PASSWORD}
flyway.connectRetries=10
flyway.connectRetriesInterval=5

# Migration file locations
flyway.locations=filesystem:/app/migrations

# Schema management
flyway.schemas=public
flyway.defaultSchema=public

# History table (stores migration metadata)
flyway.table=flyway_schema_history

# Behavior
flyway.baselineOnMigrate=true
flyway.baselineVersion=0
flyway.validateOnMigrate=true
flyway.outOfOrder=false
flyway.mixed=false

# Logging
flyway.loggers=auto
